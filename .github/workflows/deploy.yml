name: build-and-publish

# Builds the site into a container image and publishes it to GHCR.
# The server's Watchtower auto-pulls the new image within ~2 min — no SSH keys
# or secrets to manage (uses the built-in GITHUB_TOKEN).
#
# NB: for Watchtower to pull without credentials, the resulting GHCR package
# (ghcr.io/chrisjuresh/films) must be public, or the server must be logged in
# to GHCR. See deploy/README.md.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'package.json'
      - 'package-lock.json'
      - 'svelte.config.js'
      - 'vite.config.js'
      - '.npmrc'
      - 'deploy/Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ghcr.io/chrisjuresh/films:latest
          labels: |
            org.opencontainers.image.source=https://github.com/chrisJuresh/films
          cache-from: type=gha
          cache-to: type=gha,mode=max
