name: films

services:
  # The films site: a SvelteKit adapter-node server. It reads AND writes its
  # SQLite DB (watchlist/seen + metadata cache) and poster cache, so those live
  # on a host bind-mount (/srv/films) rather than inside the image.
  #
  # It is reached by the shared cloudflared tunnel over the `a3server` docker
  # network as http://films:3000 (no host/LAN port for the tunnel, so Cloudflare
  # Access can't be bypassed on the LAN). The 127.0.0.1 port is local health
  # checks only.
  films:
    container_name: films
    image: ghcr.io/chrisjuresh/films:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    # Run as host user 'chris' (uid/gid 1001) so the container can write the
    # bind-mounted /srv/films that chris owns.
    user: "1001:1001"
    environment:
      - ORIGIN=https://films.chrisj.uk
      # TSPDT_* = the data source ("They Shoot Pictures, Don't They?"), not the
      # project name. The DB is built by sync/tspdt_sync.py.
      - TSPDT_DB=/data/tspdt.db
      - TSPDT_IMG_DIR=/data/.postercache
      # Optional API keys (poster art + IMDb/RT/Metacritic). Empty = the site
      # still works with typographic posters + rankings. See .env.example.
      - TSPDT_TMDB_KEY=${TSPDT_TMDB_KEY:-}
      - TSPDT_OMDB_KEY=${TSPDT_OMDB_KEY:-}
      # Radarr download integration. Credentials remain server-side; all four
      # values must be set for the film-page Download button to work.
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - RADARR_ROOT_FOLDER=${RADARR_ROOT_FOLDER:-}
      - RADARR_QUALITY_PROFILE_ID=${RADARR_QUALITY_PROFILE_ID:-}
      # Optional Prowlarr fallback for the release picker. Radarr searches
      # indexers on TMDB's year (which it owns), so films whose release year
      # differs (e.g. festival premiere vs theatrical) find nothing. When set,
      # the picker falls back to a Prowlarr text search on OUR catalogue year and
      # pushes the chosen release back through Radarr. Only the API key is needed
      # (URL defaults to Prowlarr's in-stack address + /prowlarr URL base).
      - PROWLARR_URL=${PROWLARR_URL:-http://prowlarr:9696}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      # Optional qBittorrent-direct fallback. Some film titles defeat Radarr's
      # parser (e.g. "…1080 Bruxelles…"), so Radarr can't match/grab any release.
      # When set, those go straight to qB and are force-imported into Radarr by
      # movie id once complete. qB and Radarr share the /mnt/bay3 -> /data mount,
      # so the finished path is importable as-is.
      - QBITTORRENT_URL=${QBITTORRENT_URL:-http://qbittorrent:8081}
      - QBITTORRENT_USER=${QBITTORRENT_USER:-}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS:-}
      # iGPU transcoding (encode/stream via VAAPI). ENCODE_DIR lives under the
      # /srv/films mount so encoded copies persist. MEDIA_ROOTS are searched to
      # turn a Radarr file path into a path this container can read (auto-picks
      # the right bay); RADARR_MEDIA_PREFIX is the Radarr side stripped first.
      - VAAPI_DEVICE=/dev/dri/renderD128
      - ENCODE_DIR=/data/encoded
      - MEDIA_ROOTS=${FILMS_MEDIA_ROOTS:-/mnt/bay3/media}
      - RADARR_MEDIA_PREFIX=${FILMS_RADARR_MEDIA_PREFIX:-/data/media}
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128   # Intel iGPU (UHD 770) for VAAPI
    group_add:
      - "991"                     # host 'render' group — access to renderD128
    volumes:
      - /srv/films:/data          # tspdt.db (+ -wal/-shm), .postercache, encoded/
      # Movie library, read-only, at the same host path Radarr uses so Radarr's
      # file paths resolve. Radarr mounts /mnt/bay3 -> /data, so its files live
      # under /mnt/bay3/media (RADARR_MEDIA_PREFIX=/data/media strips the Radarr
      # side). Adjust both this mount and MEDIA_ROOTS if your layout differs.
      - /mnt/bay3/media:/mnt/bay3/media:ro
    ports:
      - "127.0.0.1:8100:3000"     # local health checks only (not the tunnel path)
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      a3server:
        aliases: [films]          # tunnel ingress target: http://films:3000
      a3-arr:                     # private Radarr API: http://radarr:7878

# The single Watchtower + cloudflared tunnel live in the `infra` project now.
networks:
  # Shared edge network for the a3server homelab: the single cloudflared tunnel
  # (in the `infra` project) and every origin it serves attach here.
  # Created once with:  docker network create a3server
  a3server:
    external: true
  # Created and owned by /opt/a3-arr-stack; joining it keeps Radarr traffic on
  # Docker's private network instead of routing through its LAN-published port.
  a3-arr:
    external: true
    name: a3-arr
